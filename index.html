<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DP Visualizer</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-python.min.js"></script>
  <link rel="stylesheet" href="CSS/style.css" />
  <script type="module" src="js/main.js"></script>
</head>
<body>

  <!-- ── App Header ───────────────────────────────────────────────────────── -->
  <header class="app-header">
    <div class="app-brand">
      <span class="app-logo">DP</span>
      <span class="app-name">Visualizer</span>
    </div>
    <span class="app-tagline">Step-by-step Dynamic Programming, visualized</span>
    <div class="app-actions">
      <button class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle light/dark theme">
        <!-- Sun icon (shown in dark mode → click to go light) -->
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
          <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
        </svg>
        <!-- Moon icon (shown in light mode → click to go dark) -->
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <a class="github-link" href="https://github.com/Laxmidhar9823/Dynamic-Programming-visualizer" target="_blank" rel="noopener" title="View on GitHub" aria-label="GitHub">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
        </svg>
      </a>
    </div>
  </header>

  <!-- ── Main Layout ──────────────────────────────────────────────────────── -->
  <div class="container">

    <!-- ── Left Panel ─────────────────────────────────────────────────────── -->
    <div class="left-panel">

      <!-- Problem selector and dynamic inputs -->
      <div class="controls-config">
        <select id="problem">
          <option value="" disabled selected>Select a DP Problem…</option>
          <optgroup label="Grid DP">
            <option value="uniquePaths">Unique Paths</option>
            <option value="minimumPathSum">Minimum Path Sum</option>
            <option value="max_path_sum">Max Path Sum</option>
          </optgroup>
          <optgroup label="Linear DP">
            <option value="climbingStairs">Climbing Stairs</option>
            <option value="houseRobber">House Robber</option>
          </optgroup>
          <optgroup label="String DP">
            <option value="lcs">Longest Common Subsequence</option>
          </optgroup>
          <optgroup label="Knapsack">
            <option value="coin_change">Coin Change</option>
            <option value="knapsack">0/1 Knapsack</option>
            <option value="partitionSubset">Partition Equal Subset Sum</option>
          </optgroup>
        </select>
        <div class="dynamic-inputs" id="dynamicInputs"></div>
        <button id="startBtn" class="start-btn" type="button" disabled>Start Visualization</button>
      </div>

      <!-- Problem description (appears on problem select) -->
      <div class="problem-panel" id="problemPanel" style="display:none">
        <div class="problem-meta">
          <span class="problem-title" id="problemTitle"></span>
          <div class="problem-badges" id="problemBadges"></div>
        </div>
        <p class="problem-desc" id="problemDesc"></p>
        <div class="problem-example" id="problemExample"></div>
      </div>

      <!-- Grid stage: the primary visualization area -->
      <div class="grid-stage">
        <div class="grid-stage-header">
          <span class="grid-stage-label" id="gridStageLabel">DP Table</span>
          <div class="legend">
            <div class="legend-item"><div class="legend-color start"></div><span>Base</span></div>
            <div class="legend-item"><div class="legend-color visited"></div><span>Filled</span></div>
            <div class="legend-item"><div class="legend-color processing"></div><span>Active</span></div>
            <div class="legend-item"><div class="legend-color end"></div><span>Result</span></div>
          </div>
        </div>

        <div class="grid-body">
          <!-- Empty state before any visualization runs -->
          <div class="empty-grid-placeholder" id="emptyGridPlaceholder">
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5">
              <rect x="3" y="3" width="7" height="7" rx="1"/>
              <rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/>
              <rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
            <span>Select a problem and press Start</span>
          </div>

          <!-- Axis labels + grid (hidden until visualization starts) -->
          <div class="grid-content" id="gridContent" style="display:none">
            <div class="axis-col-row">
              <div class="axis-corner"></div>
              <div class="axis-col-header" id="axisColHeader"></div>
            </div>
            <div class="axis-main-row">
              <div class="axis-row-header" id="axisRowHeader"></div>
              <div class="grid-scroll-area">
                <div class="grid" id="grid"></div>
                <div class="input-grid-panel" id="inputGridPanel"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Step progress bar -->
      <div class="step-progress" id="stepProgress" style="display:none">
        <div class="step-bar-track"><div class="step-bar-fill" id="stepBarFill"></div></div>
        <span class="step-label" id="stepLabel">Step 0 of 0</span>
      </div>

      <!-- Playback controls -->
      <div class="controls-playback">
        <div class="playback-buttons">
          <button id="playBtn" disabled>▶ Play</button>
          <button id="pauseBtn" disabled>⏸ Pause</button>
          <button id="stepBtn" disabled>Step →</button>
          <button id="resetBtn" disabled>↺ Reset</button>
        </div>
        <div class="speed-row">
          <label for="speedSlider">Speed</label>
          <input type="range" id="speedSlider" min="1" max="4" step="1" value="2">
          <span class="speed-label" id="speedLabel">1×</span>
        </div>
      </div>

      <!-- Result panel (hidden until visualization completes) -->
      <div class="info-panel" id="infoPanel" style="display:none"></div>

    </div><!-- /left-panel -->

    <div class="divider" id="divider"></div>

    <!-- ── Right Panel ─────────────────────────────────────────────────────── -->
    <div class="right-panel">
      <div class="code-header">
        <div class="code-header-top">
          <h2 id="codeHeaderTitle">Select a Problem</h2>
          <span class="lang-badge">Python 3</span>
        </div>
        <div class="complexity-bar" id="complexityBar" style="display:none">
          <span class="complexity-pill time" id="complexityTime"></span>
          <span class="complexity-pill space" id="complexitySpace"></span>
        </div>
      </div>

      <pre class="code-view"><code class="language-python" id="codeDisplay"><div class="empty-code-placeholder">← Select a problem to see its Python implementation</div></code></pre>
    </div><!-- /right-panel -->

  </div><!-- /container -->

</body>
</html>
